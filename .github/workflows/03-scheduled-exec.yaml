name: CI - Scheduled

on:
  workflow_dispatch:

  schedule:
    - cron: '*/30 * * * *'
    - cron: '0 0 * * 5'

jobs:
  testes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm ci

      - name: Executar testes
        run: npm test

      - name: Criar relatório simples
        run: echo "CI executado com sucesso" > reports.txt

      - name: Upload relatório
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: relatorio-schedule
          path: reports.txt
